<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymFlow | Modern Fitness Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --border: #e2e8f0;
            --danger: #ef4444;
            --success: #10b981;
            --transition: all 0.3s ease;
        }

        [data-theme="dark"] {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --border: #334155;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            transition: var(--transition);
        }

        /* Layout */
        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .nav-tabs {
            display: flex;
            gap: 10px;
            background: var(--card-bg);
            padding: 5px;
            border-radius: 12px;
            border: 1px solid var(--border);
            margin-bottom: 25px;
            overflow-x: auto;
        }

        .tab-btn {
            padding: 10px 20px;
            border: none;
            background: none;
            color: var(--text-muted);
            cursor: pointer;
            border-radius: 8px;
            font-weight: 600;
            white-space: nowrap;
        }

        .tab-btn.active {
            background: var(--accent);
            color: white;
        }

        /* Dashboard Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid var(--border);
            text-align: center;
        }

        .stat-card h3 { font-size: 0.9rem; color: var(--text-muted); text-transform: uppercase; }
        .stat-card p { font-size: 1.8rem; font-weight: 700; color: var(--accent); }

        /* Category Grid */
        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
        }

        .cat-card {
            background: var(--card-bg);
            padding: 25px 15px;
            border-radius: 16px;
            border: 1px solid var(--border);
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
        }

        .cat-card:hover { border-color: var(--accent); transform: translateY(-3px); }
        .cat-card i { font-size: 2rem; display: block; margin-bottom: 10px; }

        /* Forms & Modals */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-content {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            width: 100%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
        }

        .close-modal { position: absolute; top: 15px; right: 20px; cursor: pointer; font-size: 1.5rem; }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            margin: 8px 0 15px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--bg-color);
            color: var(--text-main);
        }

        .btn-primary {
            background: var(--accent);
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-weight: 600;
        }

        /* History Table */
        .history-table-container {
            overflow-x: auto;
            background: var(--card-bg);
            border-radius: 16px;
            border: 1px solid var(--border);
        }

        table { width: 100%; border-collapse: collapse; text-align: left; }
        th, td { padding: 15px; border-bottom: 1px solid var(--border); }
        th { color: var(--text-muted); font-size: 0.85rem; text-transform: uppercase; }

        .hidden { display: none; }

        /* Help Styles */
        .help-img { width: 100%; border-radius: 12px; margin-bottom: 15px; }
        .tag { display: inline-block; padding: 4px 8px; background: var(--accent); color: white; border-radius: 4px; font-size: 0.75rem; margin-bottom: 10px; }

        @media (max-width: 600px) {
            .nav-tabs { font-size: 0.9rem; }
            .container { padding: 15px; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>GymFlow</h1>
        <button id="themeToggle" class="tab-btn" style="border: 1px solid var(--border)">🌓 Mode</button>
    </header>

    <div class="nav-tabs">
        <button class="tab-btn active" onclick="showSection('dashboard')">🏠 Dashboard</button>
        <button class="tab-btn" onclick="showSection('workout')">🏋️ Log Workout</button>
        <button class="tab-btn" onclick="showSection('history')">📜 History</button>
    </div>

    <section id="dashboard">
        <div class="stats-grid">
            <div class="stat-card">
                <h3>This Week</h3>
                <p id="statWorkouts">0</p>
                <small>Workouts</small>
            </div>
            <div class="stat-card">
                <h3>Total Volume</h3>
                <p id="statVolume">0</p>
                <small>kg lifted</small>
            </div>
        </div>
        <h2>Muscle Groups</h2>
        <div class="category-grid" id="categoryGrid"></div>
    </section>

    <section id="workout" class="hidden">
        <h2 id="currentCatTitle">Select a Category First</h2>
        <div id="exerciseList" class="category-grid"></div>
        <div style="margin-top: 20px;">
            <button class="btn-primary" onclick="openCustomModal()" style="background: var(--text-muted);">+ Add Custom Exercise</button>
        </div>
    </section>

    <section id="history" class="hidden">
        <div style="display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;">
            <input type="text" id="searchLog" placeholder="Search exercise..." style="flex: 1; min-width: 200px;" oninput="renderHistory()">
            <select id="filterWeek" onchange="renderHistory()" style="flex: 0.5;">
                <option value="">All Weeks</option>
            </select>
        </div>
        <div class="history-table-container">
            <table id="historyTable">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Exercise</th>
                        <th>Sets x Reps</th>
                        <th>Weight</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="historyBody"></tbody>
            </table>
        </div>
    </section>
</div>

<div id="logModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal('logModal')">&times;</span>
        <h2 id="modalExName">Log Exercise</h2>
        <div id="prevPerformance" style="color: var(--success); font-size: 0.85rem; margin-bottom: 10px;"></div>
        <form id="logForm">
            <input type="hidden" id="logExName">
            <input type="hidden" id="logCat">
            <div style="display: flex; gap: 10px;">
                <div>
                    <label>Sets</label>
                    <input type="number" id="logSets" required placeholder="0">
                </div>
                <div>
                    <label>Reps</label>
                    <input type="number" id="logReps" required placeholder="0">
                </div>
            </div>
            <label>Weight (kg)</label>
            <input type="number" id="logWeight" required placeholder="0">
            <label>Notes</label>
            <textarea id="logNotes" rows="2"></textarea>
            <button type="submit" class="btn-primary">Save Log</button>
        </form>
    </div>
</div>

<div id="helpModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal('helpModal')">&times;</span>
        <div id="helpContent"></div>
    </div>
</div>

<div id="customModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal('customModal')">&times;</span>
        <h2>Add Custom Exercise</h2>
        
        <label>Muscle Group</label>
        <select id="customCat">
            <option>Back</option><option>Chest</option><option>Biceps</option>
            <option>Shoulder</option><option>Triceps</option><option>Abs</option><option>Legs</option>
        </select>
        
        <label>Exercise</label>
        <select id="customName">
            <option value="" disabled selected>Select an exercise</option>
            <option>Dips (Weighted)</option>
            <option>Machine Fly</option>
            <option>Cable Crossover</option>
            <option>Diamond Push-ups</option>
            </select>
        
        <button class="btn-primary" onclick="saveCustomExercise()" style="margin-top: 15px;">Add to Library</button>
    </div>
</div>

<script>
    // --- DATA STRUCTURES ---
    const categories = ["Back", "Chest", "Biceps", "Shoulder", "Triceps", "Abs", "Legs"];
    
    let exercises = JSON.parse(localStorage.getItem('gymFlow_exercises')) || {
        "Back": ["Pull-up", "Lat Pulldown", "Barbell Row", "Deadlift", "Seated Cable Row"],
        "Chest": ["Bench Press", "Incline DB Press", "Chest Fly", "Push-up"],
        "Biceps": ["Barbell Curl", "Hammer Curl", "Preacher Curl"],
        "Shoulder": ["Overhead Press", "Lateral Raise", "Rear Delt Fly"],
        "Triceps": ["Tricep Pushdown", "Skull Crusher", "Dips"],
        "Abs": ["Plank", "Leg Raise", "Cable Crunch"],
        "Legs": ["Squat", "Leg Press", "Romanian Deadlift", "Calf Raise"]
    };

    let logs = JSON.parse(localStorage.getItem('gymFlow_logs')) || [];

    // --- INITIALIZATION ---
    function init() {
        renderCategories();
        updateStats();
        populateWeekFilter();
        renderHistory();
    }

    // --- NAVIGATION ---
    function showSection(id) {
        document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
    }

    // --- RENDERING ---
    function renderCategories() {
        const grid = document.getElementById('categoryGrid');
        grid.innerHTML = categories.map(cat => `
            <div class="cat-card" onclick="openCategory('${cat}')">
                <i>${getEmoji(cat)}</i>
                <strong>${cat}</strong>
            </div>
        `).join('');
    }

    function openCategory(cat) {
        showSection('workout');
        document.getElementById('currentCatTitle').innerText = `${cat} Exercises`;
        const list = document.getElementById('exerciseList');
        list.innerHTML = exercises[cat].map(ex => `
            <div class="cat-card" style="padding: 15px; border-style: dashed;">
                <p style="font-weight: 600; margin-bottom: 10px;">${ex}</p>
                <div style="display: flex; gap: 5px;">
                    <button onclick="openLogModal('${cat}', '${ex}')" class="tab-btn" style="background: var(--accent); color:white; flex:1; padding: 5px;">Log</button>
                    <button onclick="openHelp('${ex}', '${cat}')" class="tab-btn" style="background: var(--border); flex:0.4; padding: 5px;">?</button>
                </div>
            </div>
        `).join('');
    }

    // --- LOGGING LOGIC ---
    function openLogModal(cat, ex) {
        const modal = document.getElementById('logModal');
        document.getElementById('modalExName').innerText = ex;
        document.getElementById('logExName').value = ex;
        document.getElementById('logCat').value = cat;
        
        // Find last performance
        const lastLog = logs.findLast(l => l.exercise === ex);
        document.getElementById('prevPerformance').innerText = lastLog ? 
            `Last time: ${lastLog.weight}kg for ${lastLog.sets}x${lastLog.reps}` : "No previous data";

        modal.style.display = 'flex';
    }

    document.getElementById('logForm').onsubmit = (e) => {
        e.preventDefault();
        const newLog = {
            id: Date.now(),
            date: new Date().toLocaleDateString(),
            week: getWeekNumber(new Date()),
            category: document.getElementById('logCat').value,
            exercise: document.getElementById('logExName').value,
            sets: document.getElementById('logSets').value,
            reps: document.getElementById('logReps').value,
            weight: document.getElementById('logWeight').value,
            notes: document.getElementById('logNotes').value
        };
        logs.unshift(newLog);
        saveData();
        closeModal('logModal');
        updateStats();
        renderHistory();
        alert('Workout Logged!');
    };

    // --- HISTORY & STATS ---
    function renderHistory() {
        const query = document.getElementById('searchLog').value.toLowerCase();
        const weekFilter = document.getElementById('filterWeek').value;
        const body = document.getElementById('historyBody');
        
        const filtered = logs.filter(l => {
            const matchesSearch = l.exercise.toLowerCase().includes(query);
            const matchesWeek = weekFilter === "" || l.week == weekFilter;
            return matchesSearch && matchesWeek;
        });

        body.innerHTML = filtered.map(l => `
            <tr>
                <td><small>${l.date}</small></td>
                <td><strong>${l.exercise}</strong><br><small>${l.category}</small></td>
                <td>${l.sets} x ${l.reps}</td>
                <td>${l.weight}kg</td>
                <td><button onclick="deleteLog(${l.id})" style="color:var(--danger); border:none; background:none; cursor:pointer;">Delete</button></td>
            </tr>
        `).join('');
    }

    function deleteLog(id) {
        if(confirm('Delete this entry?')) {
            logs = logs.filter(l => l.id !== id);
            saveData();
            renderHistory();
            updateStats();
        }
    }

    function updateStats() {
        const currentWeek = getWeekNumber(new Date());
        const weekLogs = logs.filter(l => l.week === currentWeek);
        
        // Count unique dates this week
        const uniqueDays = new Set(weekLogs.map(l => l.date)).size;
        document.getElementById('statWorkouts').innerText = uniqueDays;

        // Calculate Volume
        const volume = weekLogs.reduce((acc, curr) => acc + (curr.sets * curr.reps * curr.weight), 0);
        document.getElementById('statVolume').innerText = volume.toLocaleString();
    }

    // --- HELPERS ---
    function getEmoji(cat) {
        const emojis = { "Back": "🛶", "Chest": "🦍", "Biceps": "💪", "Shoulder": "🛡️", "Triceps": "🏹", "Abs": "🧱", "Legs": "🦵" };
        return emojis[cat] || "🏋️";
    }

    function getWeekNumber(d) {
        d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
        d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
        var yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
        return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
    }

    function populateWeekFilter() {
        const weeks = [...new Set(logs.map(l => l.week))].sort((a,b) => b-a);
        const select = document.getElementById('filterWeek');
        select.innerHTML = '<option value="">All Weeks</option>' + 
            weeks.map(w => `<option value="${w}">Week ${w}</option>`).join('');
    }

    function openHelp(ex, cat) {
        const modal = document.getElementById('helpModal');
        const content = document.getElementById('helpContent');
        content.innerHTML = `
            <span class="tag">${cat}</span>
            <h2>${ex}</h2>
            <div style="background:#eee; height:200px; display:flex; align-items:center; justify-content:center; border-radius:12px; margin:15px 0; color:#666;">
                
            </div>
            <h3>Instructions</h3>
            <p>1. Maintain a neutral spine and engage your core.<br>
               2. Perform the movement through a full range of motion.<br>
               3. Control the weight on the eccentric (downward) phase.</p>
            <br>
            <h3>Target Muscle</h3>
            <p>Primary: ${cat}</p>
        `;
        modal.style.display = 'flex';
    }

    function openCustomModal() { document.getElementById('customModal').style.display = 'flex'; }

function saveCustomExercise() {
        const cat = document.getElementById('customCat').value;
        const dropdown = document.getElementById('customName');
        const name = dropdown.value; // Gets the selected value from dropdown

        if(name && name !== "") {
            // Check if exercise already exists in that category to prevent duplicates
            if (!exercises[cat].includes(name)) {
                exercises[cat].push(name);
                localStorage.setItem('gymFlow_exercises', JSON.stringify(exercises));
                
                // Refresh the view
                openCategory(cat);
                closeModal('customModal');
                
                // Reset dropdown to the placeholder
                dropdown.selectedIndex = 0;
            } else {
                alert("This exercise is already in your library!");
                closeModal('customModal');
            }
        } else {
            alert("Please select an exercise from the list.");
        }
    }

    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    function saveData() { localStorage.setItem('gymFlow_logs', JSON.stringify(logs)); }

    // Theme Toggle
    document.getElementById('themeToggle').onclick = () => {
        const current = document.documentElement.getAttribute('data-theme');
        document.documentElement.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
    };

    window.onclick = (event) => {
        if (event.target.className === 'modal') closeModal(event.target.id);
    };

    init();
</script>
</body>
</html>
