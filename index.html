<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GymFlow | Modern Fitness Tracker</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root {
    --bg-color: #f8fafc;
    --card-bg: #ffffff;
    --text-main: #1e293b;
    --text-muted: #64748b;
    --accent: #3b82f6;
    --border: #e2e8f0;
}
[data-theme="dark"] {
    --bg-color: #0f172a;
    --card-bg: #1e293b;
    --text-main: #f1f5f9;
    --text-muted: #94a3b8;
    --border: #334155;
}
body { font-family: 'Inter'; background: var(--bg-color); color: var(--text-main); }
.container { max-width: 900px; margin: auto; padding: 20px; }
button { cursor: pointer; }
.hidden { display: none; }
</style>
</head>

<body>

<div class="container">

<h1>GymFlow</h1>

<select id="logCat" onchange="updateExerciseDropdown()">
<option value="">Select Muscle</option>
<option>Back</option>
<option>Chest</option>
<option>Biceps</option>
<option>Shoulder</option>
<option>Triceps</option>
<option>Abs</option>
<option>Legs</option>
</select>

<select id="logExName">
<option>Select Exercise</option>
</select>

</div>

<script>

// ✅ SINGLE SOURCE OF TRUTH
let exerciseDatabase = JSON.parse(localStorage.getItem('gymFlow_exercises')) || {
    "Back": [
        "Pull-up","Chin-up","Assisted Pull-up","Lat Pulldown","Straight Arm Pulldown",
        "Barbell Row","T-Bar Row","Seated Cable Row","Single Arm Dumbbell Row",
        "Deadlift","Rack Pull","Face Pull","Hyperextensions"
    ],
    "Chest": [
        "Bench Press","Incline Bench Press","Decline Bench Press",
        "Dumbbell Press","Machine Chest Press","Chest Fly",
        "Incline Dumbbell Fly","Cable Fly (High to Low / Low to High)",
        "Pec Deck","Push-up","Svend Press"
    ],
    "Biceps": [
        "Barbell Curl","Dumbbell Curl","Hammer Curl","Preacher Curl",
        "Cable Curl","Incline Dumbbell Curl","Concentration Curl",
        "Spider Curl","Reverse Curl","Zottman Curl",
        "Drag Curl","Cable Rope Curl"
    ],
    "Shoulder": [
        "Overhead Press","Arnold Press","Machine Shoulder Press",
        "Lateral Raise","Cable Lateral Raise","Front Raise",
        "Rear Delt Fly","Reverse Pec Deck","Upright Row",
        "Dumbbell Shrugs","Barbell Shrugs","Cuban Press"
    ],
    "Triceps": [
        "Tricep Pushdown","Rope Pushdown","Skull Crusher",
        "Overhead Extension","Single Arm Cable Pushdown",
        "Dips","Bench Dips","Close-Grip Bench Press",
        "Kickbacks","JM Press","Tate Press"
    ],
    "Abs": [
        "Crunch","Decline Crunch","Hanging Leg Raise",
        "Leg Raise (Lying)","Plank","Side Plank",
        "Russian Twist","Bicycle Crunch","Mountain Climbers",
        "Toe Touches","Cable Crunch","Woodchopper",
        "Flutter Kicks","Ab Wheel Rollout"
    ],
    "Legs": [
        "Squat","Sumo Squat","Goblet Squat","Bulgarian Split Squat",
        "Leg Press","Hack Squat","Lunges","Step-ups",
        "Leg Curl","Leg Extension","Romanian Deadlift",
        "Stiff Leg Deadlift","Glute Bridge","Hip Thrust",
        "Calf Raise","Seated Calf Raise","Donkey Calf Raise"
    ]
};

// ✅ INIT
function init() {
    localStorage.setItem('gymFlow_exercises', JSON.stringify(exerciseDatabase));
}

// ✅ FIXED DROPDOWN
function updateExerciseDropdown() {
    const category = document.getElementById('logCat').value;
    const dropdown = document.getElementById('logExName');

    dropdown.innerHTML = '<option>Select Exercise</option>';

    if (!category || !exerciseDatabase[category]) return;

    exerciseDatabase[category].forEach(ex => {
        let option = document.createElement('option');
        option.value = ex;
        option.textContent = ex;
        dropdown.appendChild(option);
    });
}

// 🚨 RUN ON LOAD
init();

</script>

</body>
</html>
