<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymFlow | Modern Fitness Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --border: #e2e8f0;
            --danger: #ef4444;
            --success: #10b981;
            --transition: all 0.3s ease;
        }

        [data-theme="dark"] {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --border: #334155;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            transition: var(--transition);
        }

        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .nav-tabs {
            display: flex;
            gap: 10px;
            background: var(--card-bg);
            padding: 5px;
            border-radius: 12px;
            border: 1px solid var(--border);
            margin-bottom: 25px;
            overflow-x: auto;
        }

        .tab-btn {
            padding: 10px 20px;
            border: none;
            background: none;
            color: var(--text-muted);
            cursor: pointer;
            border-radius: 8px;
            font-weight: 600;
            white-space: nowrap;
        }

        .tab-btn.active {
            background: var(--accent);
            color: white;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid var(--border);
            text-align: center;
        }

        .stat-card h3 { font-size: 0.9rem; color: var(--text-muted); text-transform: uppercase; }
        .stat-card p { font-size: 1.8rem; font-weight: 700; color: var(--accent); }

        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
        }

        .cat-card {
            background: var(--card-bg);
            padding: 25px 15px;
            border-radius: 16px;
            border: 1px solid var(--border);
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
        }

        .cat-card:hover { border-color: var(--accent); transform: translateY(-3px); }
        .cat-card i { font-size: 2rem; display: block; margin-bottom: 10px; }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-content {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            width: 100%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
        }

        .close-modal { position: absolute; top: 15px; right: 20px; cursor: pointer; font-size: 1.5rem; }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            margin: 8px 0 15px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--bg-color);
            color: var(--text-main);
        }

        .btn-primary {
            background: var(--accent);
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-weight: 600;
        }

        .history-table-container {
            overflow-x: auto;
            background: var(--card-bg);
            border-radius: 16px;
            border: 1px solid var(--border);
        }

        table { width: 100%; border-collapse: collapse; text-align: left; }
        th, td { padding: 15px; border-bottom: 1px solid var(--border); }
        th { color: var(--text-muted); font-size: 0.85rem; text-transform: uppercase; }

        .tag { display: inline-block; padding: 4px 8px; background: var(--accent); color: white; border-radius: 4px; font-size: 0.75rem; }
        .hidden { display: none; }

        @media (max-width: 600px) {
            .nav-tabs { font-size: 0.9rem; }
            .container { padding: 15px; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>GymFlow</h1>
        <button id="themeToggle" class="tab-btn" style="border: 1px solid var(--border)">🌓 Mode</button>
    </header>

    <div class="nav-tabs">
        <button class="tab-btn active" onclick="showSection('dashboard')">🏠 Dashboard</button>
        <button class="tab-btn" onclick="showSection('workout')">🏋️ Log Workout</button>
        <button class="tab-btn" onclick="showSection('history')">📜 History</button>
    </div>

    <section id="dashboard">
        <div class="stats-grid">
            <div class="stat-card">
                <h3>This Week</h3>
                <p id="statWorkouts">0</p>
                <small>Workouts</small>
            </div>
            <div class="stat-card">
                <h3>Total Volume</h3>
                <p id="statVolume">0</p>
                <small>kg lifted</small>
            </div>
        </div>
        <h2>Quick Start</h2>
        <div class="category-grid" id="categoryGrid"></div>
    </section>

    <section id="workout" class="hidden">
        <div style="display: flex; justify-content: center; align-items: center; min-height: 200px;">
            <button class="btn-primary" onclick="openLogModal()" style="max-width: 300px; font-size: 1.2rem; padding: 20px;">
                ➕ Add Workout
            </button>
        </div>
    </section>

    <section id="history" class="hidden">
        <div style="display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;">
            <input type="text" id="searchLog" placeholder="Search exercise..." style="flex: 1; min-width: 200px;" oninput="renderHistory()">
            <select id="filterWeek" onchange="renderHistory()" style="flex: 0.5;">
                <option value="">All Weeks</option>
            </select>
        </div>
        <div class="history-table-container">
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Session Summary</th>
                        <th>Exercises</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="historyBody"></tbody>
            </table>
        </div>
    </section>
</div>

<div id="logModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal('logModal')">&times;</span>
        <h2 style="margin-bottom: 20px;">Log Workout</h2>
        <form id="logForm">
            <label>Muscle Group</label>
            <select id="logCat" onchange="updateExerciseDropdown()" required>
                <option value="" disabled selected>Select Muscle Group</option>
                <option>Back</option>
                <option>Chest</option>
                <option>Biceps</option>
                <option>Shoulder</option>
                <option>Triceps</option>
                <option>Abs</option>
                <option>Legs</option>
            </select>

            <label>Exercise</label>
            <select id="logExName" required>
                <option value="" disabled selected>Select Exercise</option>
            </select>

            <div style="display: flex; gap: 10px;">
                <div style="flex: 1;">
                    <label>Sets</label>
                    <input type="number" id="logSets" required min="1" placeholder="0">
                </div>
                <div style="flex: 1;">
                    <label>Reps</label>
                    <input type="number" id="logReps" required min="1" placeholder="0">
                </div>
            </div>

            <label>Weight (kg)</label>
            <input type="number" id="logWeight" step="0.25" required min="0" placeholder="0">

            <button type="submit" class="btn-primary" style="margin-top: 10px;">Save Log</button>
        </form>
    </div>
</div>

<div id="sessionModal" class="modal">
    <div class="modal-content" style="max-width: 600px;">
        <span class="close-modal" onclick="closeModal('sessionModal')">&times;</span>
        <h2 id="sessionDateTitle" style="margin-bottom: 20px;">Workout Details</h2>
        <div class="history-table-container">
            <table>
                <thead>
                    <tr>
                        <th>Exercise</th>
                        <th>Sets x Reps</th>
                        <th>Weight</th>
                    </tr>
                </thead>
                <tbody id="sessionDetailBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const categories = ["Back", "Chest", "Biceps", "Shoulder", "Triceps", "Abs", "Legs"];
    
    let exercises = JSON.parse(localStorage.getItem('gymFlow_exercises')) || {
        "Back": [
            "Pull-up", "Chin-up", "Assisted Pull-up", "Lat Pulldown", "Straight Arm Pulldown",
            "Barbell Row", "T-Bar Row", "Seated Cable Row", "Single Arm Dumbbell Row",
            "Deadlift", "Rack Pull", "Face Pull", "Hyperextensions"
        ],
    
        "Chest": [
            "Bench Press", "Incline Bench Press", "Decline Bench Press",
            "Dumbbell Press", "Machine Chest Press", "Chest Fly",
            "Incline Dumbbell Fly", "Cable Fly (High to Low / Low to High)",
            "Pec Deck", "Push-up", "Svend Press"
        ],
    
        "Biceps": [
            "Barbell Curl", "Dumbbell Curl", "Hammer Curl", "Preacher Curl",
            "Cable Curl", "Incline Dumbbell Curl", "Concentration Curl",
            "Spider Curl", "Reverse Curl", "Zottman Curl",
            "Drag Curl", "Cable Rope Curl"
        ],
    
        "Shoulder": [
            "Overhead Press", "Arnold Press", "Machine Shoulder Press",
            "Lateral Raise", "Cable Lateral Raise", "Front Raise",
            "Rear Delt Fly", "Reverse Pec Deck", "Upright Row",
            "Dumbbell Shrugs", "Barbell Shrugs", "Cuban Press"
        ],
    
        "Triceps": [
            "Tricep Pushdown", "Rope Pushdown", "Skull Crusher",
            "Overhead Extension", "Single Arm Cable Pushdown",
            "Dips", "Bench Dips", "Close-Grip Bench Press",
            "Kickbacks", "JM Press", "Tate Press"
        ],
    
        "Abs": [
            "Crunch", "Decline Crunch", "Hanging Leg Raise",
            "Leg Raise (Lying)", "Plank", "Side Plank",
            "Russian Twist", "Bicycle Crunch", "Mountain Climbers",
            "Toe Touches", "Cable Crunch", "Woodchopper",
            "Flutter Kicks", "Ab Wheel Rollout"
        ],
    
        "Legs": [
            "Squat", "Sumo Squat", "Goblet Squat", "Bulgarian Split Squat",
            "Leg Press", "Hack Squat", "Lunges", "Step-ups",
            "Leg Curl", "Leg Extension", "Romanian Deadlift",
            "Stiff Leg Deadlift", "Glute Bridge", "Hip Thrust",
            "Calf Raise", "Seated Calf Raise", "Donkey Calf Raise"
        ]
    };

    let logs = JSON.parse(localStorage.getItem('gymFlow_logs')) || [];

    function init() {
        renderCategories();
        updateStats();
        populateWeekFilter();
        renderHistory();
    }

    function showSection(id) {
        document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        document.querySelectorAll('.nav-tabs .tab-btn').forEach(b => b.classList.remove('active'));
        if (event && event.target.classList.contains('tab-btn')) event.target.classList.add('active');
    }

    function renderCategories() {
        const grid = document.getElementById('categoryGrid');
        grid.innerHTML = categories.map(cat => `
            <div class="cat-card" onclick="showSection('workout'); openLogModal('${cat}');">
                <i>${getEmoji(cat)}</i>
                <strong>${cat}</strong>
            </div>
        `).join('');
    }

    function updateExerciseDropdown() {
        const category = document.getElementById('logCat').value;
        const exerciseSelect = document.getElementById('logExName');
        exerciseSelect.innerHTML = '<option value="" disabled selected>Select Exercise</option>';
        
        if (exercises[category]) {
            exercises[category].forEach(ex => {
                const option = document.createElement('option');
                option.value = ex;
                option.textContent = ex;
                exerciseSelect.appendChild(option);
            });
        }
    }

    function openLogModal(preSelectCat = "") {
        document.getElementById('logForm').reset();
        if (preSelectCat) {
            document.getElementById('logCat').value = preSelectCat;
            updateExerciseDropdown();
        }
        document.getElementById('logModal').style.display = 'flex';
    }

    document.getElementById('logForm').onsubmit = (e) => {
        e.preventDefault();
        const newLog = {
            id: Date.now(),
            date: new Date().toLocaleDateString(),
            week: getWeekNumber(new Date()),
            category: document.getElementById('logCat').value,
            exercise: document.getElementById('logExName').value,
            sets: document.getElementById('logSets').value,
            reps: document.getElementById('logReps').value,
            weight: document.getElementById('logWeight').value
        };
        logs.unshift(newLog);
        saveData();
        closeModal('logModal');
        updateStats();
        renderHistory();
        alert('Workout Logged!');
    };

    function renderHistory() {
        const query = document.getElementById('searchLog').value.toLowerCase();
        const weekFilter = document.getElementById('filterWeek').value;
        const body = document.getElementById('historyBody');
        
        // Group logs by Date
        const groupedLogs = logs.reduce((acc, log) => {
            const date = log.date;
            if (!acc[date]) acc[date] = [];
            acc[date].push(log);
            return acc;
        }, {});

        const dates = Object.keys(groupedLogs).sort((a, b) => new Date(b) - new Date(a));

        body.innerHTML = dates.map(date => {
            const sessionLogs = groupedLogs[date];
            const week = sessionLogs[0].week;

            // Search filtering
            const matchesSearch = sessionLogs.some(l => l.exercise.toLowerCase().includes(query));
            const matchesWeek = weekFilter === "" || week == weekFilter;

            if (!matchesSearch || !matchesWeek) return '';

            const exerciseCount = sessionLogs.length;
            const mainMuscle = sessionLogs[0].category;

            return `
                <tr onclick="viewSession('${date}')" style="cursor: pointer;">
                    <td><strong>${date}</strong></td>
                    <td>${mainMuscle} centered session</td>
                    <td><span class="tag">${exerciseCount} Exercises</span></td>
                    <td>
                        <button onclick="event.stopPropagation(); deleteSession('${date}')" 
                                style="color:var(--danger); border:none; background:none; cursor:pointer;">
                            Delete
                        </button>
                    </td>
                </tr>
            `;
        }).join('');
    }

    function viewSession(date) {
        const sessionLogs = logs.filter(l => l.date === date);
        const detailBody = document.getElementById('sessionDetailBody');
        document.getElementById('sessionDateTitle').innerText = `Workout: ${date}`;
        
        detailBody.innerHTML = sessionLogs.map(l => `
            <tr>
                <td><strong>${l.exercise}</strong><br><small>${l.category}</small></td>
                <td>${l.sets} x ${l.reps}</td>
                <td>${l.weight}kg</td>
            </tr>
        `).join('');
        
        document.getElementById('sessionModal').style.display = 'flex';
    }

    function deleteSession(date) {
        if(confirm(`Delete all entries for ${date}?`)) {
            logs = logs.filter(l => l.date !== date);
            saveData();
            renderHistory();
            updateStats();
        }
    }

    function updateStats() {
        const currentWeek = getWeekNumber(new Date());
        const weekLogs = logs.filter(l => l.week === currentWeek);
        const uniqueDays = new Set(weekLogs.map(l => l.date)).size;
        document.getElementById('statWorkouts').innerText = uniqueDays;
        const volume = weekLogs.reduce((acc, curr) => acc + (curr.sets * curr.reps * curr.weight), 0);
        document.getElementById('statVolume').innerText = volume.toLocaleString();
    }

    function getEmoji(cat) {
        const emojis = { "Back": "🛶", "Chest": "🦍", "Biceps": "💪", "Shoulder": "🛡️", "Triceps": "🏹", "Abs": "🧱", "Legs": "🦵" };
        return emojis[cat] || "🏋️";
    }

    function getWeekNumber(d) {
        d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
        d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
        var yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
        return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
    }

    function populateWeekFilter() {
        const weeks = [...new Set(logs.map(l => l.week))].sort((a,b) => b-a);
        const select = document.getElementById('filterWeek');
        select.innerHTML = '<option value="">All Weeks</option>' + 
            weeks.map(w => `<option value="${w}">Week ${w}</option>`).join('');
    }

    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    function saveData() { localStorage.setItem('gymFlow_logs', JSON.stringify(logs)); }

    document.getElementById('themeToggle').onclick = () => {
        const current = document.documentElement.getAttribute('data-theme');
        document.documentElement.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
    };

    window.onclick = (event) => {
        if (event.target.className === 'modal') closeModal(event.target.id);
    };

    init();
</script>
</body>
</html>
